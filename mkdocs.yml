theme:
  name: material
  palette:
    primary: 'amber'
    accent: 'deep orange'
  logo: img/mascot/neutral.png
  favicon: img/favicon.ico
  include_sidebar: true
  features:
    - content.code.copy
    - navigation.expand
    - navigation.path
    - navigation.prune
    - navigation.indexes
    - toc.follow
    - navigation.top
    - navigation.footer
    - content.action.edit

plugins:
  - search
  - social
  - social_override

exclude_docs: |
  img/mascot/image-prompts.md

markdown_extensions:
  - md_in_html
  - attr_list
  - admonition
  - footnotes
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      linenums: true
  - pymdownx.arithmatex:
      generic: true

extra_css:
  - css/extra.css
  - css/mascot.css

extra_javascript:
  - js/extra.js
  - https://unpkg.com/mathjax@3/es5/tex-chtml.js

watch:
  - docs
  - mkdocs.yml

