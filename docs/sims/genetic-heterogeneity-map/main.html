<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Interactive concept map showing genetic heterogeneity, locus heterogeneity, and allelic heterogeneity with examples of hearing loss and cystic fibrosis mutations.">
    <title>Genetic Heterogeneity Concept Map</title>
    <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="title-overlay">Genetic Heterogeneity Concept Map</div>
    <div id="legend">
        <div class="legend-title">Legend</div>
        <div class="legend-item"><span class="legend-dot" style="background:#e74c3c;"></span> Phenotype</div>
        <div class="legend-item"><span class="legend-dot" style="background:#3498db;"></span> Gene / Category</div>
        <div class="legend-item"><span class="legend-dot" style="background:#27ae60;"></span> Mutation</div>
    </div>
    <div id="network"></div>
    <div class="controls">
        <button id="resetBtn">Reset View</button>
        <span id="node-info">Click a node to highlight its connections</span>
    </div>
    <script src="script.js"></script>
</body>
</html>
