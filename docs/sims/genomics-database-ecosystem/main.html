<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Interactive network diagram showing major genomic databases and their data flows and cross-references.">
    <title>Genomics Database Ecosystem</title>
    <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="container">
        <div id="title-overlay">Genomics Database Ecosystem</div>
        <div id="legend">
            <div class="legend-title">Database Type</div>
            <div class="legend-item"><span class="legend-dot" style="background:#4A90D9;"></span> Sequence</div>
            <div class="legend-item"><span class="legend-dot" style="background:#5CB85C;"></span> Annotation</div>
            <div class="legend-item"><span class="legend-dot" style="background:#D9534F;"></span> Clinical</div>
            <div class="legend-item"><span class="legend-dot" style="background:#9B59B6;"></span> Ontology</div>
        </div>
        <div id="network"></div>
        <div id="info-panel">
            <div id="info-title">Click a database node</div>
            <div id="info-text">Select any node to learn what the database stores and its role in the genomics ecosystem.</div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
